<!DOCTYPE html>
<html>
<head>
  <title>AI Business Builder</title>
  <style>
    body{
      font-family: Arial;
      background:#0f172a;
      color:white;
      text-align:center;
      padding:40px;
    }
    input{
      padding:10px;
      width:300px;
      margin-top:20px;
    }
    button{
      padding:10px 20px;
      background:#22c55e;
      border:none;
      color:white;
      cursor:pointer;
      margin-left:10px;
    }
    #result{
      margin-top:20px;
      font-size:18px;
      color:#facc15;
    }
  </style>
</head>

<body>

<h1>AI Business Idea Generator</h1>
<p>Enter your skills and get a business idea</p>

<input id="skill" placeholder="example: marketing, coding">
<button onclick="generate()">Generate</button>

<div id="result"></div>

<script>
function generate(){
  let skill = document.getElementById("skill").value;
  
  // Random ideas for now
  let ideas = [
    "Start a digital marketing agency",
    "Create a niche online course",
    "Launch a dropshipping store",
    "Build a freelance service business",
    "Create a content creation brand"
  ];
  
  // Random pick
  let random = ideas[Math.floor(Math.random() * ideas.length)];
  
  document.getElementById("result").innerHTML = "<h3>Business Idea:</h3>" + random;
}
</script>

</body>
</html>
