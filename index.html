<!DOCTYPE html>
<html>
<head>
<title>AI Business Generator</title>
</head>

<body>

<h2>AI Business Builder</h2>

<input id="idea" placeholder="Enter your business idea">

<button onclick="generate()">Generate</button>

<p id="result"></p>

<script>

async function generate(){

let idea=document.getElementById("idea").value;

let response=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=YOUR_API_KEY",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

contents:[{

parts:[{

text:"Generate business name and business plan for "+idea

}]

}]

})

});

let data=await response.json();

document.getElementById("result").innerText=data.candidates[0].content.parts[0].text;

}

</script>

</body>

</html>
